<!-- 自定义样式 -->
<link rel="stylesheet" href="/assets/css/custom.css">
<link rel="stylesheet" href="/assets/css/list-pages.css">
<!-- 允许浏览器根据系统切换浅色/深色 -->
<meta name="color-scheme" content="light dark">
{% include seo-enhanced.html %}

<!-- 主题切换脚本 -->
<script>
(function() {
    const theme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (theme === 'dark' || (!theme && prefersDark)) {
        document.documentElement.classList.add('dark');
    }
})();
</script>

<!-- 全局主题切换按钮 -->
<button id="theme-toggle-global" class="theme-toggle-global" title="切换主题">
    <span class="theme-icon">☾</span>
</button>

<style>
.theme-toggle-global {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 9999;
    background: var(--accent-light, #f0f0f0);
    border: 1px solid var(--border, #e0e0e0);
    cursor: pointer;
    font-size: 1rem;
    padding: 6px 10px;
    border-radius: 4px;
    color: var(--text-primary, #1a1a1a);
    transition: all 0.2s ease;
}
.theme-toggle-global:hover {
    background: var(--hover, #ebebeb);
}
html.dark .theme-toggle-global {
    background: var(--accent-light, #252525);
    border-color: var(--border, #333333);
    color: var(--text-primary, #e0e0e0);
}
html.dark .theme-toggle-global:hover {
    background: var(--hover, #2a2a2a);
}
</style>

<script>
(function() {
    var btn = document.getElementById('theme-toggle-global');
    if (!btn) return;
    var icon = btn.querySelector('.theme-icon');
    function updateIcon() {
        icon.textContent = document.documentElement.classList.contains('dark') ? '☀' : '☾';
    }
    btn.addEventListener('click', function() {
        var isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateIcon();
    });
    updateIcon();
})();
</script>
