<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "zh-CN" }}">
{% include head.html %}
<body>
  <a href="#main-content" class="skip-link">跳到主要内容</a>
  <div class="progress-bar" id="progress-bar" role="progressbar" aria-hidden="true"></div>

  {{ content }}

  <script src="/assets/js/theme-toggle.js" defer></script>
  <script src="/assets/js/particles.js" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var bar = document.getElementById('progress-bar');
    if (!bar) return;
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
    }, { passive: true });
  });
  </script>
  <script src="/assets/js/lightbox.js" defer></script>
  <script src="/assets/js/code-copy.js" defer></script>
  <script src="/assets/js/image-blur.js" defer></script>
  <script src="/assets/js/ui-enhance.js" defer></script>

  {% if page.custom_js %}
    {% for js_file in page.custom_js %}
      <script src="/assets/js/{{ js_file }}.js" defer></script>
    {% endfor %}
  {% endif %}
</body>
</html>
