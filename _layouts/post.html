---
layout: default
---

<article class="post-article">
  <h1>{{ page.title }}</h1>
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>

  {{ content }}

  <!-- 返回首页 + 上一篇/下一篇导航 -->
  <nav class="post-nav">
    <div>
      {% if page.previous.url %}
        <a href="{{ page.previous.url }}" rel="prev">← 上一篇：{{ page.previous.title }}</a>
      {% else %}
        <span>已是第一篇</span>
      {% endif %}
    </div>

    <div class="post-nav-next">
      {% if page.next.url %}
        <a href="{{ page.next.url }}" rel="next">下一篇：{{ page.next.title }} →</a>
      {% else %}
        <span>已是最后一篇</span>
      {% endif %}
    </div>
  </nav>

  <!-- 返回首页链接 -->
  <p class="back-home">
    <a href="/">← 返回首页</a>
  </p>
</article>
