---
layout: default
---
<header>
  <h1>{{ site.title }}</h1>
  {%-if site.theme_config.show_description-%}
    <p>{{ site.description }}</p>
  {%-endif-%}
</header>

{%-if site.data.menu-%}
<nav class="menu">
{% for item in site.data.menu.entries %}
  {% if item.url %}<a href="{{ item.url }}">{{ item.title }}</a>{% else %}{{ item.title }}{% endif %}
{% endfor %}
</nav>
{%-endif-%}

{{ content }}
