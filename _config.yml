# 基础信息
title: 闲话
description: 分享日常杂记、技术笔记的极简博客
author: Lcc
lang: zh-CN
permalink: /:year/:month/:day/:title/
timezone: Asia/Shanghai

# 排除文件
exclude:
  - OPTIMIZATION_REPORT.md

# 主题设置（GitHub Pages）
remote_theme: riggraz/no-style-please

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# no-style-please 自定义选项
no_style_please:
  show_description: true
  home_posts_limit: 8
  home_posts_show_more: true
  home_posts_show_more_text: 查看全部文章
  home_posts_show_more_url: /archive/
  date_format: "%Y年%m月%d日"
  appearance: auto
  back_to_top: true
  favicon: /lccccc1024.png

# Markdown 和代码高亮
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# SEO
twitter:
  card: summary
og_image: /lccccc1024.png

# HTML 压缩
# compress_html:
#   clippings: all
#   comments: all
#   endings: all
#   ignore:
#     envs: [development]

# 可选：分页
# paginate: 10
# paginate_path: "/page:num/"

# 站点地址
url: "https://lccccc1024.github.io"
baseurl: ""

# HTML 压缩
compress_html:
  enabled: true
