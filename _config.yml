# 基础信息
title: 闲话
description: 分享日常杂记、技术笔记的极简博客
author: Lcc
lang: zh-CN
permalink: /:year/:month/:day/:title/
timezone: Asia/Shanghai

# 排除文件
exclude:
  - OPTIMIZATION_REPORT.md

# 自包含主题 — 无远程主题依赖
theme: null

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown 和代码高亮
markdown: kramdown
highlighter: rouge
kramdown:
  parse_block_html: true
  syntax_highlighter_opts:
    block:
      line_numbers: false

# SEO
twitter:
  card: summary
og_image: /lccccc1024.png

# 可选：分页（暂未启用）
# paginate: 10
# paginate_path: "/page:num/"

# 站点地址
url: "https://blog.950922.xyz"
baseurl: ""

# HTML 压缩
compress_html:
  enabled: true
